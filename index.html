<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JW 집회 교재 뷰어 2026</title>
    <!-- 모바일/타블렛 앱 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary: #4a59a8; --sidebar-bg: #f8f9fa; --active-blue: #e8f0fe; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: #fff; }
        
        /* 왼쪽 사이드바: 날짜 목록 */
        #sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .header { padding: 25px 20px; background: var(--primary); color: white; font-size: 1.2em; font-weight: bold; }
        #list-container { flex: 1; overflow-y: auto; }
        .item { padding: 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .item:hover { background: #eee; }
        .item.active { background: var(--active-blue); border-left: 6px solid var(--primary); }
        .item .date { font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        .item .title { font-size: 0.9em; color: #666; }

        /* 오른쪽: 본문 영역 */
        #main-view { flex: 1; display: flex; flex-direction: column; background: white; }
        #content { flex: 1; padding: 40px; overflow-y: auto; }
        .content-inner { max-width: 850px; margin: 0 auto; }
        .main-date { font-size: 2em; color: var(--primary); margin-bottom: 10px; font-weight: 800; }
        .main-title { font-size: 1.4em; color: #333; margin-bottom: 30px; line-height: 1.4; border-left: 4px solid #ddd; padding-left: 15px; }
        .body-text { font-size: 1.2rem; line-height: 1.9; color: #2c3e50; white-space: pre-wrap; margin-bottom: 40px; }
        
        /* 링크 섹션 */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .btn-link { display: flex; align-items: center; justify-content: center; padding: 16px; background: #f1f3f5; border: 1px solid #dee2e6; 
                    border-radius: 12px; text-decoration: none; color: #1971c2; font-weight: bold; transition: 0.2s; }
        .btn-link:hover { background: #e7f5ff; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* 타블렛 세로/모바일 대응 */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid #ddd; }
            .main-date { font-size: 1.5em; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">📅 2026 5-6월 집회 교재</div>
    <div id="list-container"></div>
</div>

<div id="main-view">
    <div id="content">
        <div class="content-inner">
            <div id="view-date" class="main-date">날짜를 선택하세요</div>
            <div id="view-title" class="main-title">집회 계획표 리스트</div>
            <div id="view-text" class="body-text">왼쪽에서 주차를 클릭하시면 상세 본문과 링크가 여기에 나타납니다.</div>
            <div id="view-links" class="link-grid"></div>
        </div>
    </div>
</div>

<script>
    // --- 1. 데이터 영역 (크롤링한 내용을 이곳에 채우세요) ---
    const meetingData = [
        {
            date: "5월 4일–10일",
            title: "보물 찾기 및 그리스도인 생활",
            text: "여기에 웹사이트에서 복사한 본문 내용을 넣으세요.\n\n[예시 본문]\n성경 읽기: 마태복음 24장\n전파 사업의 중요성에 대한 토론...",
            links: [
                { label: "📖 성경 본문 읽기", url: "https://www.jw.org/ko/library/bible/nwt/books/" },
                { label: "🎥 관련 영상 시청", url: "https://www.jw.org/ko/" }
            ]
        },
        {
            date: "5월 11일–17일",
            title: "영적 보물을 찾아서",
            text: "둘째 주 본문 내용을 여기에 입력하세요.\n풍부한 교재 내용을 그대로 붙여넣으시면 됩니다.",
            links: [
                { label: "참조료 열기", url: "https://www.jw.org/ko/" }
            ]
        }
    ];

    const listContainer = document.getElementById('list-container');
    const viewDate = document.getElementById('view-date');
    const viewTitle = document.getElementById('view-title');
    const viewText = document.getElementById('view-text');
    const viewLinks = document.getElementById('view-links');

    // --- 2. 화면 렌더링 함수 ---
    function showDetail(index) {
        const item = meetingData[index];
        viewDate.innerText = item.date;
        viewTitle.innerText = item.title;
        viewText.innerText = item.text;
        
        viewLinks.innerHTML = "";
        item.links.forEach(l => {
            const btn = document.createElement('a');
            btn.className = "btn-link";
            btn.href = l.url;
            btn.target = "_blank";
            btn.innerText = l.label;
            viewLinks.appendChild(btn);
        });

        // 리스트 활성화 표시
        document.querySelectorAll('.item').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });

        // 본문 영역 상단으로 스크롤
        document.getElementById('content').scrollTop = 0;
    }

    // --- 3. 리스트 초기화 ---
    meetingData.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = "item";
        div.innerHTML = `<span class="date">${item.date}</span><span class="title">${item.title}</span>`;
        div.onclick = () => showDetail(i);
        listContainer.appendChild(div);
    });

    // 첫 번째 항목 자동 선택
    if(meetingData.length > 0) showDetail(0);
</script>

</body>
</html>
